#include "ivr-disa.conf"
[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]

[from-trunk]
; --- Shahali Extension (Trunk2_Shahali / 09647076595) ---
exten => 09647076595,1,Goto(shahali-extension,1)
exten => +09647076595,1,Goto(shahali-extension,1)

; --- LiveKit Bridge (Trunk2_WebVoice / 09647206559) ---
exten => 09647206559,1,Goto(livekit-bridge,1)
exten => 9647206559,1,Goto(livekit-bridge,1)
exten => +9647206559,1,Goto(livekit-bridge,1)
exten => 009647206559,1,Goto(livekit-bridge,1)

; --- Claude Extension (Trunk1_AmarIP / 09649881777) ---
exten => 09649881777,1,Goto(claude-extension,1)
exten => +09649881777,1,Goto(claude-extension,1)

; --- Claude Extension (Trunk2_IPComms / 3462721145) ---
exten => 3462721145,1,Goto(claude-extension,1)
exten => +3462721145,1,Goto(claude-extension,1)
exten => 13462721145,1,Goto(claude-extension,1)
exten => +13462721145,1,Goto(claude-extension,1)

; --- Claude Extension (Trunk3_Vanilla / 35620345678) ---
exten => 35620345678,1,Goto(claude-extension,1)
exten => +35620345678,1,Goto(claude-extension,1)

; --- Execution Blocks ---

exten => livekit-bridge,1,NoOp(Inbound call to LiveKit Bridge)
same => n,Set(CALLERID(num)=${CALLERID(num)})
same => n,Dial(PJSIP/App_Bridge/sip:09647206559@app.cdoapp.online:5060)
same => n,Hangup()

exten => shahali-extension,1,NoOp(Inbound call to Shahali Extension)
same => n,Dial(PJSIP/flexisip/sip:shahali@ast.cdoapp.online:5065)
same => n,Hangup()

exten => claude-extension,1,NoOp(Inbound call to Claude Extension)
same => n,Dial(PJSIP/flexisip/sip:claude@ast.cdoapp.online:5065)
same => n,Hangup()

; =============================================================
; INBOUND TRUNK CONTEXTS
; =============================================================

; Trunk1_AmarIP (09649881777) -> Claude Extension
[from-amarip]
exten => _.,1,NoOp(Catch-all in from-amarip: ${EXTEN})
 same => n,Goto(from-trunk,09649881777,1)
exten => s,1,NoOp(Inbound from AmarIP)
 same => n,Goto(from-trunk,09649881777,1)
include => from-trunk

; Trunk2_WebVoice (09647206559) -> LiveKit Bridge (DO NOT TOUCH)
[from-webvoice]
exten => s,1,NoOp(Inbound from WebVoice)
 same => n,Goto(from-trunk,09647206559,1)
include => from-trunk

; Trunk2_IPComms -> DISA (DO NOT TOUCH)
[from-ipcomms]
exten => s,1,Goto(ipcomms-disa,1)
exten => 3462721145,1,Goto(ipcomms-disa,1)
exten => +3462721145,1,Goto(ipcomms-disa,1)
exten => 13462721145,1,Goto(ipcomms-disa,1)
exten => +13462721145,1,Goto(ipcomms-disa,1)
exten => _.,1,Goto(ipcomms-disa,1)

exten => ipcomms-disa,1,NoOp(Inbound from IPComms - routing to DISA)
 same => n,Goto(internal-disa,*3472,1)

; Trunk3_Vanilla (35620345678) -> Claude Extension
[from-vanilla]
exten => s,1,NoOp(Inbound from Vanilla)
 same => n,Goto(from-trunk,35620345678,1)
exten => _.,1,NoOp(Catch-all in from-vanilla: ${EXTEN})
 same => n,Goto(from-trunk,35620345678,1)
include => from-trunk

; Trunk2_Shahali (09647076595) -> Shahali Extension
[from-shahali]
exten => s,1,NoOp(Inbound from Shahali trunk)
 same => n,Goto(from-trunk,09647076595,1)
exten => _.,1,NoOp(Catch-all in from-shahali: ${EXTEN})
 same => n,Goto(from-trunk,09647076595,1)
include => from-trunk

[from-pstn]
include => from-ipcomms

; =============================================================
; INTERNAL EXTENSIONS (app users)
; =============================================================

[from-internal]
; 4-digit extensions -> Flexisip (extension-to-extension calls)
exten => _XXXX,1,NoOp(Forwarding to Flexisip: ${EXTEN})
same => n,Set(TARGET_CONTACT=${PJSIP_AOR(${EXTEN},contact)})
same => n,Dial(PJSIP/flexisip/sip:${EXTEN}@ast.cdoapp.online:5065)
same => n,Hangup()
include => ivr-speed-dial
include => from-trunk
include => outbound-routing
include => internal-disa

; =============================================================
; OUTBOUND ROUTING
; =============================================================

[outbound-routing]

; --- Shahali outbound: routes via Trunk2_Shahali (09647076595) ---
; Caller ID matching: calls from SIP user "shahali" at Flexisip
exten => _01XXXXXXXXX/shahali,1,NoOp(Shahali outbound via Trunk2_Shahali)
 same => n,Set(CALLERID(all)="09647076595" <09647076595>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk2_Shahali)
 same => n,Hangup()

exten => _096XXXXXXXX/shahali,1,NoOp(Shahali outbound via Trunk2_Shahali)
 same => n,Set(CALLERID(all)="09647076595" <09647076595>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk2_Shahali)
 same => n,Hangup()

exten => _00./shahali,1,NoOp(Shahali international via Trunk2_Shahali)
 same => n,Set(CALLERID(all)="09647076595" <09647076595>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk2_Shahali)
 same => n,Hangup()

; --- Claude outbound: routes via Trunk1_AmarIP (09649881777) ---
; Caller ID matching: calls from SIP user "claude" at Flexisip
exten => _01XXXXXXXXX/claude,1,NoOp(Claude outbound via Trunk1_AmarIP)
 same => n,Set(CALLERID(all)="09649881777" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

exten => _096XXXXXXXX/claude,1,NoOp(Claude outbound via Trunk1_AmarIP)
 same => n,Set(CALLERID(all)="09649881777" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

exten => _00./claude,1,NoOp(Claude international via Trunk1_AmarIP)
 same => n,Set(CALLERID(all)="09649881777" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

; --- Generic outbound fallback (any extension) via Trunk1_AmarIP ---
exten => _01XXXXXXXXX,1,NoOp(Outbound to ${EXTEN} via AmarIP)
 same => n,Set(CALLERID(all)="AmarIP" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

exten => _096XXXXXXXX,1,NoOp(Outbound to ${EXTEN} via AmarIP)
 same => n,Set(CALLERID(all)="AmarIP" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

exten => _9XX,1,NoOp(Outbound to ${EXTEN} via AmarIP)
 same => n,Set(CALLERID(all)="AmarIP" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

exten => _1XXXX,1,NoOp(Outbound to ${EXTEN} via AmarIP)
 same => n,Set(CALLERID(all)="AmarIP" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

exten => _00.,1,NoOp(International to ${EXTEN} via AmarIP)
 same => n,Set(CALLERID(all)="AmarIP" <09649881777>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk1_AmarIP)
 same => n,Hangup()

; --- IPComms outbound ---
exten => _001XXXXXXXXXX,1,NoOp(Outbound to ${EXTEN} via IPComms)
 same => n,Set(CALLERID(all)=3462721145)
 same => n,Dial(PJSIP/1${EXTEN:3}@Trunk2_IPComms)
 same => n,Hangup()

; --- Vanilla outbound ---
exten => _00971XXXXXXXXX,1,NoOp(Outbound to ${EXTEN} via Vanilla)
 same => n,Set(CALLERID(all)="Vanilla" <35620345678>)
 same => n,Dial(PJSIP/${EXTEN}@Trunk3_Vanilla)
 same => n,Hangup()
